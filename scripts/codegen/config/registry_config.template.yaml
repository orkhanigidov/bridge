# Registry Configuration Template
# Rename this file to 'registry_config.yaml' for actual use.

# ==========================================================================================
# REGISTRY CONFIGURATION INSTRUCTIONS
# ==========================================================================================
#
# This YAML file configures C++ objects and functions exposed through the API.
# Each section follows specific formatting requirements.
#
# ------------------------------------------------------------------------------------------
# 1. PROJECT SETTINGS
# ------------------------------------------------------------------------------------------
# Path to C++ headers directory
project:
  include_path: "path/to/include"

# ------------------------------------------------------------------------------------------
# 2. HEADERS
# ------------------------------------------------------------------------------------------
# List of headers to include for the bindings
headers:
  - "path/to/header1.h"
  - "path/to/header2.h"

# ------------------------------------------------------------------------------------------
# 3. NAMESPACE
# ------------------------------------------------------------------------------------------
# Primary namespace for the API objects
namespace: "exampleNamespace"

# ------------------------------------------------------------------------------------------
# 4. API OBJECTS
# ------------------------------------------------------------------------------------------
# Define C++ class instances to register in the registry
api_objects:
  - identifier: "objectName"                    # ID used in API calls
    cpp_class: "Namespace::Class"               # C++ class to instantiate
# Example:
#  - identifier: "graph"
#    cpp_class: "ogdf::Graph"

# ------------------------------------------------------------------------------------------
# 5. BINDINGS
# ------------------------------------------------------------------------------------------
bindings:
  # --- GLOBAL FUNCTIONS ---
  # Register free functions callable without an object context
  global:
    - api_name: "functionName"                  # Name exposed in API
  # Example:
#    - api_name: "randomNumber"

  # --- MEMBER METHODS ---
  # Register class methods that operate on registered objects
  member:
    - object: "objectName"                      # Must match an identifier from api_objects
      api_name: "methodName"                    # Name exposed in API
      # For overloaded methods, specify the parameter signature:
      overload_signature: "type1,type2,..."     # Comma-separated C++ parameter types
  # Example:
#    - object: "graph"
#      api_name: "newNode"
#      overload_signature: "node,node,int"

# ==========================================================================================